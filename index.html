<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق صيدليتي الذكية</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        
        <header class="header">
            <h1>صيدليتي الذكية</h1>
        </header>

        <div class="search-section">
            <div class="search-wrapper">
                <input type="text" id="search-input" placeholder="ابحث عن اسم الدواء (مثال: بنادول)...">
            </div>
            <button class="btn-camera" title="صوّر الدواء أو الروشتة">
                <svg viewBox="0 0 24 24">
                    <path d="M4 4h3l2-2h6l2 2h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2zm8 3a5 5 0 1 0 0 10 5 5 0 0 0 0-10zm0 2a3 3 0 1 1 0 6 3 3 0 0 1 0-6z"/>
                </svg>
            </button>
        </div>

        <main class="results-section">
            
            <div class="pharmacy-card">
                <div class="pharmacy-info">
                    <h3>الصيدلية المركزية (Centrale)</h3>
                    <p>📍 تفرغ زينة - وسط العاصمة</p>
                </div>
                <div class="pharmacy-status">
                    <div class="price">120 MRU</div>
                    <span class="status-badge available">متوفر</span>
                </div>
            </div>

            <div class="pharmacy-card">
                <div class="pharmacy-info">
                    <h3>صيدلية البرء</h3>
                    <p>📍 لكصر - قرب المستشفى الوطني</p>
                </div>
                <div class="pharmacy-status">
                    <div class="price">120 MRU</div>
                    <span class="status-badge available">متوفر</span>
                </div>
            </div>

            <div class="pharmacy-card">
                <div class="pharmacy-info">
                    <h3>صيدلية الرحمة</h3>
                    <p>📍 عرفات - كارفور مدريد</p>
                </div>
                <div class="pharmacy-status">
                    <div class="price">250 MRU</div>
                    <span class="status-badge scarce">شحيح</span>
                </div>
            </div>

        </main>

        <nav class="bottom-nav">
            <button class="nav-item active">
                <span>🔍</span>
                الرئيسية
            </button>
            <button class="nav-item">
                <span>📦</span>
                طلباتي
            </button>
            <button class="nav-item">
                <span>👤</span>
                الحساب
            </button>
        </nav>

    </div>

    <script src="app.js"></script>
</body>
</html>
