

<!DOCTYPE html>
<html lang="en">


<head>
   
    <title>Generer la facture</title>

<link rel="stylesheet" href="style.css">
</head>



<body>
    <div class="div-container">
<div>
            <h1>Generer la facture</h1>
    </div>
        <div style="padding: 30px;">
            <input type="text" id="design" placeholder="Designation" >
            <input type="text" id="quantite" placeholder="Quantite" >
            <input type="text" id="prixUnitaire" placeholder="Prix unitaire" >
            <input type="text" id="nomClient" placeholder="Nom du client" >
            <input type="text" style="color: rgba(0, 0, 0, 0.977);" value="Remise 25%" readonly>

            <button id="btnCalculer" onclick="claculerPT()">Calculer le PT</button>

            <input type="text" id="pt" placeholder="PT" readonly>
            <input type="text" id="ptRemise" placeholder="PT - Remise" readonly>

        </div>
    </div>
    <script>
function claculerPT(){
    var design = document.getElementById("design").value;
    var quantite = document.getElementById("quantite").value;
    var prixUnitaire = document.getElementById("prixUnitaire").value;
    var nomClient = document.getElementById("nomClient");

    if(isNaN(quantite) || isNaN(prixUnitaire) || !nomClient.value){
        alert("Veuillez remplir tous les champs correctement!");
        return;
    }

    var pt = quantite * prixUnitaire;
    var ptRemise = pt * (1 - 0.25);
    var btn = document.getElementById("btnCalculer");

    nomClient.style.backgroundColor = "#8781a3";
    btn.style.backgroundColor = "#22B14C";

    
    var message = `Bonjour ${nomClient.value} vous devez payer ${ptRemise} MRU`;
    alert(message);
}
</script>
</body>
